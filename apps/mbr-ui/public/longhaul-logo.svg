<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Truck silhouette -->
  <rect x="2" y="20" width="90" height="22" rx="2" fill="#27AE60"/>
  <rect x="78" y="12" width="34" height="30" rx="2" fill="#1B2A3B"/>
  <rect x="80" y="14" width="30" height="14" rx="1" fill="#4FC3F7" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="20" cy="42" r="5" fill="#1B2A3B"/>
  <circle cx="20" cy="42" r="2" fill="#ccc"/>
  <circle cx="60" cy="42" r="5" fill="#1B2A3B"/>
  <circle cx="60" cy="42" r="2" fill="#ccc"/>
  <circle cx="100" cy="42" r="5" fill="#1B2A3B"/>
  <circle cx="100" cy="42" r="2" fill="#ccc"/>
  <!-- Road line -->
  <line x1="0" y1="47" x2="200" y2="47" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="8 4"/>
  <!-- Wordmark -->
  <text x="120" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#1B2A3B" letter-spacing="0.5">LONGHAUL</text>
</svg>
