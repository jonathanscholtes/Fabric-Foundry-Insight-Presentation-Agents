name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ── Detect changed paths ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mbr_api:       ${{ steps.filter.outputs.mbr_api }}
      mbr_tools_mcp: ${{ steps.filter.outputs.mbr_tools_mcp }}
      mbr_ui:        ${{ steps.filter.outputs.mbr_ui }}
      agents:        ${{ steps.filter.outputs.agents }}
      infra:         ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mbr_api:
              - 'apps/mbr-api/**'
            mbr_tools_mcp:
              - 'apps/mbr-tools-mcp/**'
            mbr_ui:
              - 'apps/mbr-ui/**'
            agents:
              - 'agents/**'
            infra:
              - 'infra/**'

  # ── Infrastructure (only when infra files change) ─────────────────────────
  infra:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.tfstate"

      - name: Terraform apply
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var="environment=dev" \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -var="fabric_sql_server=${{ vars.FABRIC_SQL_SERVER }}" \
            -var="fabric_sql_database=${{ vars.FABRIC_SQL_DATABASE }}"

  # ── Read Terraform outputs (always runs, after optional apply) ────────────
  read-infra:
    name: Read infra outputs
    runs-on: ubuntu-latest
    needs: [changes, infra]
    if: always() && !cancelled() && (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    env:
      ARM_CLIENT_ID:       ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    outputs:
      acr:                   ${{ steps.tfout.outputs.acr }}
      resource_group:        ${{ steps.tfout.outputs.resource_group }}
      foundry_endpoint:      ${{ steps.tfout.outputs.foundry_endpoint }}
      mcp_fqdn:              ${{ steps.tfout.outputs.mcp_fqdn }}
      mbr_api_url:           ${{ steps.tfout.outputs.mbr_api_url }}
      model_deployment:      ${{ steps.tfout.outputs.model_deployment }}
      mini_model_deployment: ${{ steps.tfout.outputs.mini_model_deployment }}
      key_vault_uri:         ${{ steps.tfout.outputs.key_vault_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Terraform init (read-only)
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.tfstate"

      - name: Read Terraform outputs
        id: tfout
        run: |
          echo "acr=$(terraform -chdir=infra output -raw container_registry_login_server)"       >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform -chdir=infra output -raw resource_group_name)"        >> $GITHUB_OUTPUT
          echo "foundry_endpoint=$(terraform -chdir=infra output -raw foundry_project_endpoint)" >> $GITHUB_OUTPUT
          echo "mcp_fqdn=$(terraform -chdir=infra output -raw mcp_tools_api_fqdn)"              >> $GITHUB_OUTPUT
          echo "mbr_api_url=$(terraform -chdir=infra output -raw mbr_api_url)"                  >> $GITHUB_OUTPUT
          echo "model_deployment=$(terraform -chdir=infra output -raw model_deployment)"         >> $GITHUB_OUTPUT
          echo "mini_model_deployment=$(terraform -chdir=infra output -raw mini_model_deployment)" >> $GITHUB_OUTPUT
          echo "key_vault_uri=$(terraform -chdir=infra output -raw key_vault_uri)"               >> $GITHUB_OUTPUT

  # ── Build & deploy mbr-api ────────────────────────────────────────────────
  build-mbr-api:
    name: Build mbr-api
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.mbr_api == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-api
        run: |
          az acr build \
            --registry $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image    mbr-api:${{ github.sha }} \
            --image    mbr-api:latest \
            apps/mbr-api

      - name: Update mbr-api Container App
        run: |
          az containerapp update \
            --name ca-mbr-api \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/mbr-api:${{ github.sha }} \
            --output none

  # ── Build & deploy mbr-tools-mcp ─────────────────────────────────────────
  build-mbr-tools-mcp:
    name: Build mbr-tools-mcp
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.mbr_tools_mcp == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-tools-mcp
        run: |
          az acr build \
            --registry $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image    mbr-tools-mcp:${{ github.sha }} \
            --image    mbr-tools-mcp:latest \
            apps/mbr-tools-mcp

      - name: Update mbr-tools-mcp Container App
        run: |
          az containerapp update \
            --name ca-mbr-tools-mcp \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/mbr-tools-mcp:${{ github.sha }} \
            --output none

  # ── Build & deploy mbr-ui ────────────────────────────────────────────────
  build-mbr-ui:
    name: Build mbr-ui
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.mbr_ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-ui
        run: |
          az acr build \
            --registry  $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image     mbr-ui:${{ github.sha }} \
            --image     mbr-ui:latest \
            --build-arg VITE_API_BASE_URL=/api \
            apps/mbr-ui

      - name: Update mbr-ui Container App
        run: |
          az containerapp update \
            --name ca-mbr-ui \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/mbr-ui:${{ github.sha }} \
            --output none

  # ── Deploy Foundry agents ─────────────────────────────────────────────────
  agents:
    name: Deploy Foundry agents
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.agents == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent SDK
        run: pip install -r agents/requirements.txt

      - name: Deploy Foundry agents
        run: |
          python agents/deploy.py \
            --project-endpoint       ${{ needs.read-infra.outputs.foundry_endpoint }} \
            --model-deployment       ${{ needs.read-infra.outputs.model_deployment }} \
            --mini-model-deployment  ${{ needs.read-infra.outputs.mini_model_deployment }} \
            --key-vault-uri          ${{ needs.read-infra.outputs.key_vault_uri }} \
            --mcp-server-url         https://${{ needs.read-infra.outputs.mcp_fqdn }}/mcp \
            --output                 agents/agent_ids.json

      - name: Inject agent names into ca-mbr-api
        run: |
          CONV_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'conversational' in k][0])")
          PRES_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'presentation' in k][0])")
          az containerapp update \
            --name ca-mbr-api \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --set-env-vars "CONVERSATIONAL_AGENT_NAME=$CONV_NAME" "MBR_PRESENTATION_AGENT_NAME=$PRES_NAME" \
            --output none

  # ── Smoke test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [read-infra, build-mbr-api, build-mbr-tools-mcp, build-mbr-ui]
    if: always() && !cancelled() && needs.read-infra.result == 'success'
    steps:
      - name: Health check — mbr-api
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ needs.read-infra.outputs.mbr_api_url }}/health"

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [read-infra, build-mbr-api, build-mbr-tools-mcp, build-mbr-ui, agents, smoke-test]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "### MBR Deploy — dev @ \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-api | ${{ needs.read-infra.outputs.mbr_api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Foundry  | ${{ needs.read-infra.outputs.foundry_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-api       | ${{ needs.build-mbr-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-tools-mcp | ${{ needs.build-mbr-tools-mcp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-ui        | ${{ needs.build-mbr-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agents        | ${{ needs.agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test    | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
