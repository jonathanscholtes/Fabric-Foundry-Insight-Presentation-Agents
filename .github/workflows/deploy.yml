name: Deploy

on:
  push:
    branches: [main]

env:
  TF_STATE_RG: rg-tfstate-ins

permissions:
  id-token: write
  contents: read

jobs:
  # ── Detect changed paths ──────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      insights_api:       ${{ steps.filter.outputs.insights_api }}
      presentation_tools_mcp: ${{ steps.filter.outputs.presentation_tools_mcp }}
      insights_ui:        ${{ steps.filter.outputs.insights_ui }}
      agents:        ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            insights_api:
              - 'apps/insights-api/**'
            presentation_tools_mcp:
              - 'apps/presentation-tools-mcp/**'
            insights_ui:
              - 'apps/insights-ui/**'
            agents:
              - 'agents/**'

  # ── Read Terraform outputs (read-only — infra is provisioned locally via deploy.ps1) ──
  # NOTE: This pipeline deliberately does NOT run `terraform apply`. Infrastructure is
  # provisioned once from a workstation with deploy.ps1, which generates the gitignored
  # infra/terraform.tfvars (holding the sticky resource_token and suffixed resource names).
  # CI has no access to that file, so an apply here would fall back to the unsuffixed
  # variable defaults and plan to destroy/recreate every resource. CI only reads outputs
  # and deploys code (container images + Foundry agents).
  read-infra:
    name: Read infra outputs
    runs-on: ubuntu-latest
    needs: changes
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
    outputs:
      acr:                   ${{ steps.tfout.outputs.acr }}
      resource_group:        ${{ steps.tfout.outputs.resource_group }}
      foundry_endpoint:      ${{ steps.tfout.outputs.foundry_endpoint }}
      mcp_fqdn:              ${{ steps.tfout.outputs.mcp_fqdn }}
      insights_api_url:           ${{ steps.tfout.outputs.insights_api_url }}
      model_deployment:      ${{ steps.tfout.outputs.model_deployment }}
      mini_model_deployment: ${{ steps.tfout.outputs.mini_model_deployment }}
      key_vault_uri:         ${{ steps.tfout.outputs.key_vault_uri }}
      ai_project_id:         ${{ steps.tfout.outputs.ai_project_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
          terraform_wrapper: false

      - name: Derive TF state storage name
        run: |
          SUB_ID=$(az account show --query id -o tsv)
          SUFFIX=${SUB_ID//-/}
          echo "TF_STATE_STORAGE=stotfins${SUFFIX:0:8}" >> $GITHUB_ENV

      - name: Terraform init (read-only)
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${{ env.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ env.TF_STATE_STORAGE }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=insights.tfstate"

      - name: Read Terraform outputs
        id: tfout
        run: |
          echo "acr=$(terraform -chdir=infra output -raw container_registry_login_server)"       >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform -chdir=infra output -raw resource_group_name)"        >> $GITHUB_OUTPUT
          echo "foundry_endpoint=$(terraform -chdir=infra output -raw foundry_project_endpoint)" >> $GITHUB_OUTPUT
          echo "mcp_fqdn=$(terraform -chdir=infra output -raw mcp_tools_api_fqdn)"              >> $GITHUB_OUTPUT
          echo "insights_api_url=$(terraform -chdir=infra output -raw insights_api_url)"                  >> $GITHUB_OUTPUT
          echo "model_deployment=$(terraform -chdir=infra output -raw model_deployment)"         >> $GITHUB_OUTPUT
          echo "mini_model_deployment=$(terraform -chdir=infra output -raw mini_model_deployment)" >> $GITHUB_OUTPUT
          echo "key_vault_uri=$(terraform -chdir=infra output -raw key_vault_uri)"               >> $GITHUB_OUTPUT
          echo "ai_project_id=$(terraform -chdir=infra output -raw ai_project_id)"               >> $GITHUB_OUTPUT

  # ── Build & deploy insights-api ────────────────────────────────────────────────
  build-insights-api:
    name: Build insights-api
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.insights_api == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push insights-api
        run: |
          az acr build \
            --registry $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image    insights-api:${{ github.sha }} \
            --image    insights-api:latest \
            apps/insights-api

      - name: Update insights-api Container App
        run: |
          az containerapp update \
            --name ca-insights-api \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/insights-api:${{ github.sha }} \
            --output none

  # ── Build & deploy presentation-tools ─────────────────────────────────────────
  build-presentation-tools:
    name: Build presentation-tools
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.presentation_tools_mcp == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push presentation-tools
        run: |
          az acr build \
            --registry $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image    presentation-tools:${{ github.sha }} \
            --image    presentation-tools:latest \
            apps/presentation-tools-mcp

      - name: Update presentation-tools Container App
        run: |
          az containerapp update \
            --name ca-presentation-tools \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/presentation-tools:${{ github.sha }} \
            --output none

  # ── Build & deploy insights-ui ────────────────────────────────────────────────
  build-insights-ui:
    name: Build insights-ui
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.insights_ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push insights-ui
        run: |
          az acr build \
            --registry  $(echo "${{ needs.read-infra.outputs.acr }}" | cut -d. -f1) \
            --image     insights-ui:${{ github.sha }} \
            --image     insights-ui:latest \
            --build-arg VITE_API_BASE_URL=/api \
            apps/insights-ui

      - name: Update insights-ui Container App
        run: |
          az containerapp update \
            --name ca-insights-ui \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --image ${{ needs.read-infra.outputs.acr }}/insights-ui:${{ github.sha }} \
            --output none

  # ── Deploy Foundry agents ─────────────────────────────────────────────────
  agents:
    name: Deploy Foundry agents
    runs-on: ubuntu-latest
    needs: [changes, read-infra]
    if: needs.changes.outputs.agents == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent SDK
        run: pip install -r agents/requirements.txt

      - name: Deploy Foundry agents
        run: |
          python agents/deploy.py \
            --project-endpoint       ${{ needs.read-infra.outputs.foundry_endpoint }} \
            --model-deployment       ${{ needs.read-infra.outputs.model_deployment }} \
            --mini-model-deployment  ${{ needs.read-infra.outputs.mini_model_deployment }} \
            --key-vault-uri          ${{ needs.read-infra.outputs.key_vault_uri }} \
            --mcp-server-url         https://${{ needs.read-infra.outputs.mcp_fqdn }}/mcp \
            --output                 agents/agent_ids.json

      - name: Inject agent names into ca-insights-api
        run: |
          CONV_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'conversational' in k][0])")
          PRES_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'presentation' in k][0])")
          az containerapp update \
            --name ca-insights-api \
            --resource-group ${{ needs.read-infra.outputs.resource_group }} \
            --set-env-vars "CONVERSATIONAL_AGENT_NAME=$CONV_NAME" "PRESENTATION_AGENT_NAME=$PRES_NAME" \
            --output none

  # NOTE: Wiring the fabric_dataagent connection credentials (the CI equivalent of the
  # old "fabric-connection" job) is handled locally by deploy.ps1 Phase 3b. It only needs
  # to run after a Terraform apply, which no longer happens in CI, so it lives with the
  # workstation deploy flow rather than here.

  # ── Smoke test ────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [read-infra, build-insights-api, build-presentation-tools, build-insights-ui]
    if: always() && !cancelled() && needs.read-infra.result == 'success'
    steps:
      - name: Health check — insights-api
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ needs.read-infra.outputs.insights_api_url }}/health"

  # ── Summary ───────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [read-infra, build-insights-api, build-presentation-tools, build-insights-ui, agents, smoke-test]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "### Insights Deploy — dev @ \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| insights-api | ${{ needs.read-infra.outputs.insights_api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Foundry  | ${{ needs.read-infra.outputs.foundry_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| insights-api       | ${{ needs.build-insights-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| presentation-tools | ${{ needs.build-presentation-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| insights-ui        | ${{ needs.build-insights-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agents        | ${{ needs.agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test    | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
